name: Build Docs Image

on:
  push:
    paths:
      - ".github/docs-image/**"

  pull_request:
    paths:
      - ".github/docs-image/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: meta
        run: |
          echo "TAG=${{ hashFiles('.github/docs-image/**') }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .github/docs-image
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/docs-builder:${{ steps.meta.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
