# .github/workflows/docs.yml
name: Build Docs

on:
  pull_request:
    branches:
      - master
    paths:
      - 'man/**'
      - '**.md'
      - '.github/docs-image/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: meta
        run: |
          echo "TAG=${{ hashFiles('.github/docs-image/**') }}" >> $GITHUB_OUTPUT

    container:
      image: ghcr.io/${{ github.repository }}/docs-builder:${{ steps.meta.outputs.TAG }}

    steps:
      - uses: actions/checkout@v5

      - name: Build docs
        run: make doc-regenerate
